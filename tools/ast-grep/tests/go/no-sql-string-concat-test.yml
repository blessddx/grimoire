id: no-sql-string-concat
valid:
  - |
    package main
    func main() {
      db.Query("SELECT * FROM users WHERE id = ?", id)
    }
  - |
    package main
    func main() {
      query := "SELECT * FROM users WHERE active = true"
    }
invalid:
  - |
    package main
    func main() {
      query := "SELECT * FROM users WHERE name = '" + name + "'"
    }
  - |
    package main
    func main() {
      q := "DELETE FROM sessions WHERE user_id = " + uid
    }
  - |
    package main
    func main() {
      q := fmt.Sprintf("SELECT * FROM users WHERE id = %s", userID)
    }
