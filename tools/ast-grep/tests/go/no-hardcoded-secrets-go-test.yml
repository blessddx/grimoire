id: no-hardcoded-secrets-go
valid:
  - |
    package main
    func main() {
      password := os.Getenv("DB_PASSWORD")
    }
  - |
    package main
    func main() {
      timeout := "30s"
    }
invalid:
  - |
    package main
    func main() {
      password := "supersecret123"
    }
  - |
    package main
    func main() {
      apiKey := "sk-1234567890abcdef"
    }
  - |
    package main
    var password = "supersecret123"
  - |
    package main
    const token = "tok-abc123"
