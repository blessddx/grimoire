id: no-fetch-without-hash
language: nix
severity: error
message: Pin fetches with a hash — bare URL fetches are not reproducible.
note: "Use the attrset form with sha256, e.g.: builtins.fetchTarball { url = \"...\"; sha256 = \"...\"; }"
rule:
  any:
    - pattern: builtins.fetchTarball $URL
    - pattern: builtins.fetchurl $URL
    - pattern: fetchTarball $URL
constraints:
  URL:
    kind: string_expression
