id: no-hardcoded-secrets-nix
language: nix
severity: error
message: Do not hardcode secrets — use environment variables or agenix/sops-nix.
note: Use agenix, sops-nix, or runtime environment variables for secrets in Nix configurations.
rule:
  pattern: $VAR = $VAL
constraints:
  VAR:
    regex: (?i)(api_?key|api_?secret|auth_?token|access_?token|secret_?key|password|private_?key)
  VAL:
    kind: string_expression
