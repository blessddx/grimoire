id: no-swallowed-exception
language: python
severity: error
message: "Do not swallow exceptions with 'except: pass' — at minimum log the error."
note: Silently swallowing exceptions hides bugs and makes debugging nearly impossible.
rule:
  kind: except_clause
  all:
    - any:
        - not:
            has:
              stopBy: neighbor
              any:
                - kind: identifier
                - kind: as_pattern
        - has:
            stopBy: neighbor
            kind: identifier
            regex: ^(Exception|BaseException)$
    - has:
        kind: block
        any:
          - has:
              kind: pass_statement
            not:
              has:
                kind: expression_statement
          - has:
              kind: expression_statement
              has:
                kind: ellipsis
            not:
              has:
                any:
                  - kind: pass_statement
                  - kind: return_statement
