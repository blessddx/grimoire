id: no-hardcoded-secrets-go
language: go
severity: error
message: Do not hardcode secrets — use environment variables or a secrets manager.
note: Use os.Getenv() or a vault client to retrieve secrets at runtime.
rule:
  any:
    - pattern: $VAR := $VAL
    - pattern: var $VAR = $VAL
    - pattern: var $VAR $TYPE = $VAL
    - pattern: const $VAR = $VAL
    - pattern: const $VAR $TYPE = $VAL
constraints:
  VAR:
    regex: (?i)(password|passwd|secret|api_?key|token|private_?key|auth_?token|access_?key)
  VAL:
    regex: ^"
